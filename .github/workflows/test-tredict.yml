name: Test Tredict API

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily

permissions:
  contents: write

jobs:
  test:
    name: Diagnose Tredict API endpoints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run diagnostic
        env:
          TREDICT_API_KEY: ${{ secrets.TREDICT_API_KEY }}
        run: python scripts/test_tredict.py

      - name: Commit diagnostic log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/tredict-diagnostic.json
          if git diff --cached --quiet; then
            echo "No changes to log."
          else
            git commit -m "chore(logs): tredict api diagnostic"
            git push
          fi
